name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: |
          npm ci --include=optional
          npm install --no-save --no-package-lock \
            lightningcss-linux-x64-gnu@1.32.0 \
            @tailwindcss/oxide-linux-x64-gnu@4.3.2 \
            @rolldown/binding-linux-x64-gnu@1.1.5 \
            @unrs/resolver-binding-linux-x64-gnu@1.11.1 \
            @img/sharp-linux-x64@0.34.5 \
            @img/sharp-libvips-linux-x64@1.2.4
      - run: npm audit --include=dev --audit-level=critical
      - run: npm test
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: python3 -m unittest discover -s ops/tests
      - run: python3 -m compileall -q ops/frontpage_metrics_v2 ops/frontpage-metrics-collector.py ops/frontpage-metrics-collector-v2.py ops/frontpage-metrics-runtime-map.py ops/frontpage-metrics-shadow-compare.py
      - name: Check Ansible deployment syntax
        run: |
          python3 -m pip install ansible-core
          ansible-galaxy collection install community.docker ansible.posix
          trap 'rm -f .vault_pass' EXIT
          printf 'frontpage-ci-vault-password\n' > .vault_pass
          ansible-playbook --syntax-check -i inventory/hosts.yml ansible-playbook.yml --vault-password-file .vault_pass
      - run: npm run build
        env:
          CI: true
          AUTH_SECRET: frontpage-ci-build-secret
          VERSION: ci-${{ github.sha }}

  browser:
    name: Public browser & accessibility
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: |
          npm ci --include=optional
          npm install --no-save --no-package-lock \
            lightningcss-linux-x64-gnu@1.32.0 \
            @tailwindcss/oxide-linux-x64-gnu@4.3.2 \
            @rolldown/binding-linux-x64-gnu@1.1.5 \
            @unrs/resolver-binding-linux-x64-gnu@1.11.1 \
            @img/sharp-linux-x64@0.34.5 \
            @img/sharp-libvips-linux-x64@1.2.4
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          CI: true
          AUTH_SECRET: frontpage-ci-browser-secret
          VERSION: ci-${{ github.sha }}
          FRONTPAGE_E2E_OWNER: '1'
          FRONTPAGE_E2E_OWNER_TOKEN: frontpage-e2e-owner-token
          OWNER_GITHUB_ID: e2e-owner
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  docker-check:
    name: Docker build & runtime check
    needs: [test, browser]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: frontpage:ci-${{ github.sha }}
          cache-from: type=gha
          build-args: |
            VERSION=pr-${{ github.sha }}

      - name: Run Docker runtime smoke
        run: node tests/docker-runtime-smoke.mjs --image frontpage:ci-${{ github.sha }} --version pr-${{ github.sha }}

  publish:
    name: Build & publish image
    needs: [test, browser, docker-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=sha-${{ github.sha }}

      - name: Run published image smoke
        run: |
          image="$(printf '%s\n' "$DOCKER_METADATA_OUTPUT_TAGS" | awk '/:sha-/ { print; exit }')"
          test -n "$image"
          node tests/docker-runtime-smoke.mjs --image "$image" --version sha-${{ github.sha }}

      - name: Summary
        run: |
          latest_image="$(printf '%s\n' "$DOCKER_METADATA_OUTPUT_TAGS" | head -n 1)"
          echo "### Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with: \`docker pull $latest_image\`" >> $GITHUB_STEP_SUMMARY
