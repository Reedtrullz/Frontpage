name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: |
          npm ci --include=optional
          npm install --no-save --no-package-lock \
            lightningcss-linux-x64-gnu@1.32.0 \
            @tailwindcss/oxide-linux-x64-gnu@4.2.4 \
            @rolldown/binding-linux-x64-gnu@1.1.5 \
            @unrs/resolver-binding-linux-x64-gnu@1.11.1 \
            @img/sharp-linux-x64@0.34.5 \
            @img/sharp-libvips-linux-x64@1.2.4
      - run: npm test
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: python3 -m unittest ops.tests.test_frontpage_metrics_collector
      - run: python3 -m py_compile ops/frontpage-metrics-collector.py
      - run: npm run build
        env:
          CI: true
          AUTH_SECRET: frontpage-ci-build-secret
          VERSION: ci-${{ github.sha }}

  browser:
    name: Public browser & accessibility
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: |
          npm ci --include=optional
          npm install --no-save --no-package-lock \
            lightningcss-linux-x64-gnu@1.32.0 \
            @tailwindcss/oxide-linux-x64-gnu@4.2.4 \
            @rolldown/binding-linux-x64-gnu@1.1.5 \
            @unrs/resolver-binding-linux-x64-gnu@1.11.1 \
            @img/sharp-linux-x64@0.34.5 \
            @img/sharp-libvips-linux-x64@1.2.4
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          CI: true
          AUTH_SECRET: frontpage-ci-browser-secret
          VERSION: ci-${{ github.sha }}
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  docker-check:
    name: Docker build check
    needs: [test, browser]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: frontpage:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          build-args: |
            VERSION=pr-${{ github.sha }}

  publish:
    name: Build & publish image
    needs: [test, browser]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=sha-${{ github.sha }}

      - name: Summary
        run: |
          echo "### Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with: \`docker pull ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
