- name: Deploy Frontpage to VPS
  hosts: vps
  gather_facts: false
  vars:
    github_repository: "Reedtrullz/Frontpage"
    docker_image_repository: "ghcr.io/reedtrullz/frontpage"
    container_name: "frontpage"
    requested_commit_sha: "{{ lookup('env', 'GITHUB_SHA') | default('', true) }}"
    docker_image: "{{ docker_image_repository }}:sha-{{ deploy_commit_sha }}"
    metrics_dir: "/var/lib/frontpage-metrics"
    metrics_v1_dir: "{{ metrics_dir }}/v1"
    metrics_config_dir: "/etc/frontpage-metrics"
    metrics_user: "frontpage-metrics"
    observer_user: "frontpage-observer"
    observer_lib_dir: "/usr/local/lib/frontpage"
    observer_run_dir: "/run/frontpage-metrics"
    observer_shadow_dir: "{{ metrics_dir }}/v2-shadow"
    observer_private_dir: "{{ metrics_dir }}/private"
    shadow_evidence_epoch_file: "{{ metrics_dir }}/shadow-evidence-epoch.json"
    observer_package_files:
      - __init__.py
      - collector.py
      - config.py
      - daemon.py
      - incidents.py
      - migrations.py
      - model.py
      - projections.py
      - publisher.py
      - rollups.py
      - store.py
      - sources/__init__.py
      - sources/cgroup.py
      - sources/processes.py
      - sources/procfs.py
      - sources/runtime.py
      - sources/services.py
    owner_github_login: "Reedtrullz"
    observability_v2_promote: "{{ lookup('env', 'FRONTPAGE_OBSERVABILITY_V2_PROMOTE') | default('0', true) == '1' }}"
    observability_v2_reset_evidence: "{{ lookup('env', 'FRONTPAGE_OBSERVABILITY_RESET_EVIDENCE') | default('0', true) == '1' }}"
    observability_v2_shadow_gate: "{{ lookup('env', 'OBSERVABILITY_V2_SHADOW_GATE') | default('', true) }}"

  pre_tasks:
    - name: Validate requested deployment commit
      ansible.builtin.assert:
        that:
          - requested_commit_sha == '' or requested_commit_sha is match('^[a-f0-9]{40}$')
        fail_msg: "GITHUB_SHA must be a full 40 character lowercase Git commit SHA."

    - name: Require explicit shadow evidence before observability promotion
      ansible.builtin.assert:
        that:
          - not observability_v2_promote or observability_v2_shadow_gate == 'approved'
        fail_msg: "Promotion requires OBSERVABILITY_V2_SHADOW_GATE=approved after the documented 48-hour comparison gate."

    - name: Prevent evidence reset during observability promotion
      ansible.builtin.assert:
        that:
          - not (observability_v2_promote and observability_v2_reset_evidence)
        fail_msg: "Evidence reset and observability promotion cannot run in the same deployment."

    - name: Validate required deployment secrets
      ansible.builtin.assert:
        that:
          - vault_auth_secret is defined
          - vault_auth_github_id is defined
          - vault_auth_github_secret is defined
          - vault_github_token is defined
        fail_msg: "Required encrypted deployment variables are missing."
      no_log: true

    - name: Gather systemd service state for observability mode
      become: true
      ansible.builtin.service_facts:

    - name: Derive persistent observability mode
      ansible.builtin.set_fact:
        observability_v2_enabled: >-
          {{
            observability_v2_promote
            or (
              ansible_facts.services.get(
                'frontpage-metrics-collector-v2.service', {}
              ).get('status', 'disabled') == 'enabled'
            )
          }}
        observer_service_name: >-
          {{
            'frontpage-metrics-collector-v2.service'
            if (
              observability_v2_promote
              or (
                ansible_facts.services.get(
                  'frontpage-metrics-collector-v2.service', {}
                ).get('status', 'disabled') == 'enabled'
              )
            )
            else 'frontpage-metrics-collector-v2-shadow.service'
          }}

    - name: Resolve GitHub owner id for app owner checks
      delegate_to: localhost
      become: false
      ansible.builtin.uri:
        url: "https://api.github.com/users/{{ owner_github_login }}"
        headers:
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        return_content: false
        status_code: 200
      register: github_owner_user

    - name: Resolve current main commit for immutable deployment
      delegate_to: localhost
      become: false
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_repository }}/commits/main"
        headers:
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        return_content: false
        status_code: 200
      register: github_main_commit
      when: requested_commit_sha | length == 0

    - name: Set deployment identity facts
      ansible.builtin.set_fact:
        app_owner_github_id: "{{ github_owner_user.json.id | string }}"
        deploy_commit_sha: "{{ requested_commit_sha if requested_commit_sha | length > 0 else github_main_commit.json.sha }}"

    - name: Inspect current container
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: current_container

    - name: Set previous deployment facts
      ansible.builtin.set_fact:
        previous_image: "{{ current_container.container.Image if current_container.exists else 'none' }}"
        previous_version: >-
          {{
            (current_container.container.Config.Env if current_container.exists else [])
            | select('match', '^VERSION=')
            | list
            | first
            | default('VERSION=unknown', true)
            | regex_replace('^VERSION=', '')
          }}

  tasks:
    - name: Ensure docker group exists
      become: true
      ansible.builtin.group:
        name: docker
        state: present

    - name: Create metrics collector user
      become: true
      ansible.builtin.user:
        name: "{{ metrics_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        groups: docker
        append: true

    - name: Create unprivileged observability collector user
      become: true
      ansible.builtin.user:
        name: "{{ observer_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        groups: ""
        append: false

    - name: Install POSIX ACL support for collector isolation
      become: true
      ansible.builtin.apt:
        name: acl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Resolve metrics group id
      become: true
      ansible.builtin.getent:
        database: group
        key: "{{ metrics_user }}"
        split: ":"

    - name: Set metrics group id fact
      ansible.builtin.set_fact:
        metrics_group_id: "{{ ansible_facts.getent_group[metrics_user][1] }}"

    - name: Create metrics directories
      become: true
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ metrics_dir }}", owner: "{{ metrics_user }}", group: "{{ metrics_user }}", mode: "0750" }
        - { path: "{{ metrics_v1_dir }}", owner: "{{ metrics_user }}", group: "{{ metrics_user }}", mode: "0750" }
        - { path: "{{ metrics_config_dir }}", owner: "root", group: "root", mode: "0755" }
        - { path: "{{ observer_private_dir }}", owner: "{{ observer_user }}", group: "{{ observer_user }}", mode: "0700" }
        - { path: "{{ observer_shadow_dir }}", owner: "{{ observer_user }}", group: "{{ observer_user }}", mode: "0750" }
        - { path: "{{ observer_shadow_dir }}/public", owner: "{{ observer_user }}", group: "{{ metrics_user }}", mode: "2750" }
        - { path: "{{ observer_shadow_dir }}/owner", owner: "{{ observer_user }}", group: "{{ metrics_user }}", mode: "2750" }
        - { path: "{{ metrics_dir }}/v2", owner: "{{ observer_user }}", group: "{{ observer_user }}", mode: "0750" }
        - { path: "{{ metrics_dir }}/v2/public", owner: "{{ observer_user }}", group: "{{ metrics_user }}", mode: "2750" }
        - { path: "{{ metrics_dir }}/v2/owner", owner: "{{ observer_user }}", group: "{{ metrics_user }}", mode: "2750" }
        - { path: "{{ observer_run_dir }}", owner: "{{ observer_user }}", group: "{{ observer_user }}", mode: "0750" }
        - { path: "{{ observer_lib_dir }}/ops", owner: "root", group: "root", mode: "0755" }
        - { path: "{{ observer_lib_dir }}/ops/frontpage_metrics_v2", owner: "root", group: "root", mode: "0755" }
        - { path: "{{ observer_lib_dir }}/ops/frontpage_metrics_v2/sources", owner: "root", group: "root", mode: "0755" }

    - name: Grant observer execute-only traversal of metrics root
      become: true
      ansible.posix.acl:
        path: "{{ metrics_dir }}"
        entity: "{{ observer_user }}"
        etype: user
        permissions: x
        state: present

    - name: Inspect legacy root-level metrics files
      become: true
      ansible.builtin.stat:
        path: "{{ metrics_dir }}/{{ item }}"
      loop:
        - latest.json
        - history.json
      register: legacy_metrics_files

    - name: Seed dedicated v1 directory from legacy metrics files
      become: true
      ansible.builtin.copy:
        src: "{{ item.stat.path }}"
        dest: "{{ metrics_v1_dir }}/{{ item.item }}"
        remote_src: true
        force: false
        owner: "{{ metrics_user }}"
        group: "{{ metrics_user }}"
        mode: "0640"
      loop: "{{ legacy_metrics_files.results }}"
      when: item.stat.exists | default(false)

    - name: Install metrics collector script
      become: true
      ansible.builtin.copy:
        src: ops/frontpage-metrics-collector.py
        dest: /usr/local/bin/frontpage-metrics-collector
        owner: root
        group: root
        mode: "0755"
      register: metrics_collector_script_copy

    - name: Install metrics collector config
      become: true
      ansible.builtin.copy:
        src: ops/frontpage-metrics.config.json
        dest: "{{ metrics_config_dir }}/config.json"
        owner: root
        group: root
        mode: "0644"
      register: metrics_collector_config_copy

    - name: Find stale observer bytecode directories
      become: true
      ansible.builtin.find:
        paths: "{{ observer_lib_dir }}/ops/frontpage_metrics_v2"
        patterns: "__pycache__"
        recurse: true
        file_type: directory
      register: installed_observer_bytecode_directories

    - name: Remove stale observer bytecode
      become: true
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ installed_observer_bytecode_directories.files }}"

    - name: Find installed observability collector source files
      become: true
      ansible.builtin.find:
        paths: "{{ observer_lib_dir }}/ops/frontpage_metrics_v2"
        patterns: "*.py"
        recurse: true
        file_type: file
      register: installed_observer_package_files

    - name: Remove stale observability collector source files
      become: true
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ installed_observer_package_files.files }}"
      when: >-
        (
          item.path
          | regex_replace('^' ~ observer_lib_dir ~ '/ops/frontpage_metrics_v2/', '')
        ) not in observer_package_files
      register: observer_stale_package_files_removed

    - name: Install observability collector Python package
      become: true
      ansible.builtin.copy:
        src: "ops/frontpage_metrics_v2/{{ item }}"
        dest: "{{ observer_lib_dir }}/ops/frontpage_metrics_v2/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ observer_package_files }}"
      register: observer_package_copy

    - name: Install observability collector executables
      become: true
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "0755"
      loop:
        - { src: "ops/frontpage-metrics-collector-v2.py", dest: "/usr/local/bin/frontpage-metrics-collector-v2" }
        - { src: "ops/frontpage-metrics-runtime-map.py", dest: "/usr/local/bin/frontpage-metrics-runtime-map" }
        - { src: "ops/frontpage-metrics-shadow-compare.py", dest: "/usr/local/bin/frontpage-metrics-shadow-compare" }
      register: observer_executables_copy

    - name: Install observability collector config
      become: true
      ansible.builtin.copy:
        src: ops/frontpage-metrics-v2.config.json
        dest: "{{ metrics_config_dir }}/config-v2.json"
        owner: root
        group: root
        mode: "0644"
      register: observer_config_copy

    - name: Install runtime workload allowlist
      become: true
      ansible.builtin.copy:
        dest: "{{ metrics_config_dir }}/runtime-allowlist.json"
        owner: root
        group: root
        mode: "0644"
        content: |
          [
            {"workload_id": "frontpage-app", "container_name": "{{ container_name }}"}
          ]
      register: runtime_allowlist_copy

    - name: Install metrics collector systemd units
      become: true
      ansible.builtin.copy:
        src: "ops/systemd/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - frontpage-metrics-collector.service
        - frontpage-metrics-collector.timer
        - frontpage-metrics-collector-v2.service
        - frontpage-metrics-collector-v2-shadow.service
      register: collector_units_copy
      notify: Reload systemd

    - name: Inspect shadow evidence epoch
      become: true
      ansible.builtin.stat:
        path: "{{ shadow_evidence_epoch_file }}"
      register: shadow_evidence_epoch

    - name: Read current shadow collector state
      become: true
      ansible.builtin.command:
        argv: ["systemctl", "is-active", "frontpage-metrics-collector-v2-shadow.service"]
      register: shadow_collector_state_before_deploy
      changed_when: false
      failed_when: false

    - name: Determine changed observability runtime assets
      ansible.builtin.set_fact:
        observer_runtime_executable_changed: >-
          {{
            observer_executables_copy.results
            | selectattr('changed')
            | map(attribute='item.dest')
            | reject('equalto', '/usr/local/bin/frontpage-metrics-shadow-compare')
            | list
            | length > 0
          }}
        observer_comparator_executable_changed: >-
          {{
            observer_executables_copy.results
            | selectattr('changed')
            | map(attribute='item.dest')
            | select('equalto', '/usr/local/bin/frontpage-metrics-shadow-compare')
            | list
            | length > 0
          }}
        observer_runtime_unit_changed: >-
          {{
            collector_units_copy.results
            | selectattr('changed')
            | map(attribute='item')
            | select('match', '^frontpage-metrics-collector-v2')
            | list
            | length > 0
          }}

    - name: Determine whether comparison semantics changed
      ansible.builtin.set_fact:
        shadow_collector_runtime_changed: >-
          {{
            observer_stale_package_files_removed.changed
            or observer_package_copy.changed
            or observer_runtime_executable_changed
            or observer_config_copy.changed
            or runtime_allowlist_copy.changed
            or observer_runtime_unit_changed
          }}
        comparison_semantics_changed: >-
          {{
            metrics_collector_script_copy.changed
            or metrics_collector_config_copy.changed
            or observer_stale_package_files_removed.changed
            or observer_package_copy.changed
            or observer_runtime_executable_changed
            or observer_comparator_executable_changed
            or observer_config_copy.changed
            or runtime_allowlist_copy.changed
            or collector_units_copy.changed
          }}

    - name: Determine shadow collector continuity actions
      ansible.builtin.set_fact:
        shadow_evidence_reset_required: >-
          {{
            not shadow_evidence_epoch.stat.exists
            or comparison_semantics_changed
            or observability_v2_reset_evidence
          }}
        shadow_collector_restart_required: >-
          {{
            shadow_collector_runtime_changed
            or shadow_collector_state_before_deploy.rc != 0
          }}
        shadow_evidence_reset_reason: >-
          {{
            'collector_or_comparator_change' if comparison_semantics_changed
            else (
              'evidence_marker_missing' if not shadow_evidence_epoch.stat.exists
              else 'explicit_operator_reset'
            )
          }}

    - name: Enable metrics collector timer
      become: true
      ansible.builtin.systemd:
        name: frontpage-metrics-collector.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Run metrics collector once before app swap
      become: true
      ansible.builtin.systemd:
        name: frontpage-metrics-collector.service
        state: started

    - name: Verify metrics latest file exists
      become: true
      ansible.builtin.stat:
        path: "{{ metrics_v1_dir }}/latest.json"
      register: metrics_latest

    - name: Fail if metrics latest file is missing
      ansible.builtin.fail:
        msg: "Frontpage metrics collector did not write latest.json"
      when: not metrics_latest.stat.exists

    - name: Verify metrics directory permissions
      become: true
      ansible.builtin.stat:
        path: "{{ metrics_v1_dir }}"
      register: metrics_directory

    - name: Verify metrics history file exists
      become: true
      ansible.builtin.stat:
        path: "{{ metrics_v1_dir }}/history.json"
      register: metrics_history

    - name: Verify metrics file permissions
      ansible.builtin.assert:
        that:
          - metrics_directory.stat.mode == "0750"
          - metrics_latest.stat.exists
          - metrics_latest.stat.mode == "0640"
          - metrics_history.stat.exists
          - metrics_history.stat.mode == "0640"
        fail_msg: "Metrics directory or JSON file permissions are too broad."

    - name: Stop shadow collector before rebuilding runtime state
      become: true
      ansible.builtin.systemd:
        name: frontpage-metrics-collector-v2-shadow.service
        state: stopped
      when:
        - not observability_v2_enabled
        - shadow_collector_restart_required

    - name: Ensure observer runtime directory exists
      become: true
      ansible.builtin.file:
        path: "{{ observer_run_dir }}"
        state: directory
        owner: "{{ observer_user }}"
        group: "{{ observer_user }}"
        mode: "0750"

    - name: Write current allowlisted container facts for shadow collection
      become: true
      ansible.builtin.copy:
        dest: "{{ observer_run_dir }}/container-facts.json"
        owner: root
        group: "{{ observer_user }}"
        mode: "0640"
        content: >-
          {{
            {
              'containers': (
                [
                  {
                    'name': container_name,
                    'pid': current_container.container.State.Pid,
                    'image_sha': current_container.container.Image
                  }
                ] if (current_container.exists | default(false)) else []
              )
            } | to_nice_json
          }}

    - name: Generate current allowlisted runtime map
      become: true
      ansible.builtin.command:
        argv:
          - /usr/sbin/runuser
          - --user
          - "{{ observer_user }}"
          - --
          - /usr/local/bin/frontpage-metrics-runtime-map
          - --allowlist
          - "{{ metrics_config_dir }}/runtime-allowlist.json"
          - --facts
          - "{{ observer_run_dir }}/container-facts.json"
          - --output
          - "{{ observer_run_dir }}/runtime-map.json"
          - --generated-at
          - "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
      changed_when: true

    - name: Set runtime map ownership
      become: true
      ansible.builtin.file:
        path: "{{ observer_run_dir }}/runtime-map.json"
        owner: "{{ observer_user }}"
        group: "{{ observer_user }}"
        mode: "0640"

    - name: Find existing shadow projection directories
      become: true
      ansible.builtin.find:
        paths:
          - "{{ observer_shadow_dir }}/public"
          - "{{ observer_shadow_dir }}/owner"
        file_type: directory
        recurse: true
      register: shadow_projection_directories

    - name: Normalize existing shadow projection directory ownership
      become: true
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ observer_user }}"
        group: "{{ metrics_user }}"
        mode: "2750"
      loop: "{{ shadow_projection_directories.files }}"

    - name: Find existing shadow projection files
      become: true
      ansible.builtin.find:
        paths:
          - "{{ observer_shadow_dir }}/public"
          - "{{ observer_shadow_dir }}/owner"
        file_type: file
        recurse: true
      register: existing_shadow_projection_files

    - name: Normalize existing shadow projection file ownership
      become: true
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ observer_user }}"
        group: "{{ metrics_user }}"
        mode: "0640"
      loop: "{{ existing_shadow_projection_files.files }}"

    - name: Run observability collector shadow preflight
      become: true
      ansible.builtin.command:
        argv:
          - /usr/sbin/runuser
          - --user
          - "{{ observer_user }}"
          - --
          - /usr/local/bin/frontpage-metrics-collector-v2
          - --config
          - "{{ metrics_config_dir }}/config-v2.json"
          - --metrics-dir
          - "{{ observer_shadow_dir }}"
          - --database
          - "{{ observer_private_dir }}/metrics-v2-shadow.sqlite3"
          - --runtime-map
          - "{{ observer_run_dir }}/runtime-map.json"
          - --once
      changed_when: true
      when:
        - not observability_v2_enabled
        - shadow_collector_restart_required

    - name: Enable observability collector shadow service
      become: true
      ansible.builtin.systemd:
        name: frontpage-metrics-collector-v2-shadow.service
        enabled: true
        state: "{{ 'restarted' if shadow_collector_restart_required else 'started' }}"
        daemon_reload: true
      when: not observability_v2_enabled

    - name: Read host clock for shadow evidence restart
      become: true
      ansible.builtin.command: date -u +%Y-%m-%dT%H:%M:%SZ
      register: shadow_evidence_clock
      changed_when: false
      when:
        - not observability_v2_enabled
        - shadow_evidence_reset_required

    - name: Start a new shadow evidence epoch
      become: true
      ansible.builtin.copy:
        dest: "{{ shadow_evidence_epoch_file }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          {
            "schema_version": 1,
            "started_at": "{{ shadow_evidence_clock.stdout }}",
            "commit_sha": "{{ deploy_commit_sha }}",
            "reason": "{{ shadow_evidence_reset_reason }}"
          }
      when:
        - not observability_v2_enabled
        - shadow_evidence_reset_required

    - name: Verify collector services and observer group isolation
      become: true
      ansible.builtin.command:
        argv: ["id", "-nG", "{{ observer_user }}"]
      register: observer_groups
      changed_when: false

    - name: Read collector service states
      become: true
      ansible.builtin.command:
        argv: ["systemctl", "is-active", "{{ item }}"]
      loop:
        - frontpage-metrics-collector.timer
        - frontpage-metrics-collector-v2-shadow.service
      register: collector_service_states
      changed_when: false
      when: (not observability_v2_enabled) or observability_v2_promote

    - name: Verify shadow projection permissions
      become: true
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ observer_shadow_dir }}/public/latest.v2.json"
        - "{{ observer_shadow_dir }}/owner/latest.v2.json"
        - "{{ observer_shadow_dir }}/owner/host/1h.v2.json"
      register: shadow_projection_files
      when: (not observability_v2_enabled) or observability_v2_promote

    - name: Assert observer group isolation
      ansible.builtin.assert:
        that:
          - "'docker' not in observer_groups.stdout.split()"
        fail_msg: "Collector v2 observer has unsafe supplementary groups."

    - name: Assert shadow service and output contract
      ansible.builtin.assert:
        that:
          - collector_service_states.results | map(attribute='stdout') | list == ['active', 'active']
          - shadow_projection_files.results | map(attribute='stat.exists') | min
          - shadow_projection_files.results | map(attribute='stat.mode') | unique | list == ['0640']
          - shadow_projection_files.results | map(attribute='stat.gr_name') | unique | list == [metrics_user]
        fail_msg: "Collector v2 shadow mode is not isolated, active, or publishing strict files."
      when: (not observability_v2_enabled) or observability_v2_promote

    - name: Refresh 48-hour shadow comparison artifact for promotion
      become: true
      ansible.builtin.command:
        argv:
          - /usr/local/bin/frontpage-metrics-shadow-compare
          - --v1-history
          - "{{ metrics_v1_dir }}/comparison-history.json"
          - --v2-database
          - "{{ observer_private_dir }}/metrics-v2-shadow.sqlite3"
          - --projection-root
          - "{{ observer_shadow_dir }}"
          - --evidence-epoch
          - "{{ shadow_evidence_epoch_file }}"
          - --output
          - "{{ metrics_dir }}/shadow-gate.json"
      register: shadow_comparison
      changed_when: true
      failed_when: false
      when: observability_v2_promote

    - name: Read 48-hour shadow comparison artifact
      become: true
      ansible.builtin.slurp:
        src: "{{ metrics_dir }}/shadow-gate.json"
      register: shadow_gate_file
      when: observability_v2_promote

    - name: Decode 48-hour shadow comparison artifact
      ansible.builtin.set_fact:
        shadow_gate_evidence: "{{ shadow_gate_file.content | b64decode | from_json }}"
      when: observability_v2_promote

    - name: Enforce 48-hour shadow comparison gate
      ansible.builtin.assert:
        that:
          - shadow_comparison.rc == 0
          - shadow_gate_evidence.schema_version | int == 2
          - shadow_gate_evidence.approved | bool
          - shadow_gate_evidence.duration_hours | float >= 48
          - shadow_gate_evidence.missed_minutes | int == 0
          - shadow_gate_evidence.maximum_gap_seconds | int <= 120
          - shadow_gate_evidence.evidence_age_seconds | float >= 0
          - shadow_gate_evidence.evidence_age_seconds | float <= 120
          - shadow_gate_evidence.incomplete_v2_host_minutes | int == 0
          - shadow_gate_evidence.p99_relative_divergence_percent.cpu | float < 2
          - shadow_gate_evidence.p99_relative_divergence_percent.ram | float < 2
          - shadow_gate_evidence.p99_relative_divergence_percent.disk | float < 2
          - shadow_gate_evidence.public_service_mismatch_percent | float == 0
        fail_msg: "Collector v2 promotion blocked because the 48-hour shadow comparison gate is not proven."
      when: observability_v2_promote

    - name: Stop shadow collector for explicit promotion
      become: true
      ansible.builtin.systemd:
        name: frontpage-metrics-collector-v2-shadow.service
        enabled: false
        state: stopped
      when: observability_v2_promote

    - name: Seed promoted observability projections
      become: true
      ansible.builtin.command:
        argv:
          - /usr/sbin/runuser
          - --user
          - "{{ observer_user }}"
          - --
          - /usr/local/bin/frontpage-metrics-collector-v2
          - --config
          - "{{ metrics_config_dir }}/config-v2.json"
          - --metrics-dir
          - "{{ metrics_dir }}/v2"
          - --database
          - "{{ observer_private_dir }}/metrics-v2-shadow.sqlite3"
          - --runtime-map
          - "{{ observer_run_dir }}/runtime-map.json"
          - --once
      changed_when: true
      when: observability_v2_promote

    - name: Enable promoted observability collector
      become: true
      ansible.builtin.systemd:
        name: frontpage-metrics-collector-v2.service
        enabled: true
        state: restarted
        daemon_reload: true
      when: observability_v2_promote

    - name: Pull commit-addressed image from GHCR
      community.docker.docker_image:
        name: "{{ docker_image }}"
        source: pull
        force_source: yes

    - name: Stop and remove existing container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Start new container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "127.0.0.1:3002:3000"
        log_driver: "json-file"
        log_options:
          max-size: "10m"
          max-file: "3"
        healthcheck:
          test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
        env: >-
          {{
            {
              'NODE_ENV': 'production',
              'PORT': '3000',
              'HOSTNAME': '0.0.0.0',
              'VERSION': deploy_commit_sha,
              'DATA_DIR': '/data',
              'AUTH_URL': 'https://reidar.tech',
              'AUTH_SECRET': vault_auth_secret,
              'AUTH_GITHUB_ID': vault_auth_github_id,
              'AUTH_GITHUB_SECRET': vault_auth_github_secret,
              'OWNER_GITHUB_ID': app_owner_github_id,
              'GITHUB_TOKEN': vault_github_token,
              'METRICS_DIR': '/metrics'
            }
            | combine(
                {
                  'PUBLIC_METRICS_DIR': '/metrics-public',
                  'OWNER_METRICS_DIR': '/metrics-owner',
                  'FRONTPAGE_OBSERVABILITY_V2': '1'
                } if observability_v2_enabled else {}
              )
          }}
        groups:
          - "{{ metrics_group_id }}"
        volumes: >-
          {{
            [
              (docker_volume_data | default('frontpage_data')) ~ ':/data',
              metrics_v1_dir ~ ':/metrics:ro'
            ]
            + (
                [
                  metrics_dir ~ '/v2/public:/metrics-public:ro',
                  metrics_dir ~ '/v2/owner:/metrics-owner:ro'
                ] if observability_v2_enabled else []
              )
          }}

    - name: Inspect newly active container for runtime binding
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: active_container_for_runtime_map

    - name: Recreate observer runtime directory for active binding
      become: true
      ansible.builtin.file:
        path: "{{ observer_run_dir }}"
        state: directory
        owner: "{{ observer_user }}"
        group: "{{ observer_user }}"
        mode: "0750"

    - name: Write newly active allowlisted container facts
      become: true
      ansible.builtin.copy:
        dest: "{{ observer_run_dir }}/container-facts.json"
        owner: root
        group: "{{ observer_user }}"
        mode: "0640"
        content: >-
          {{
            {
              'containers': [
                {
                  'name': container_name,
                  'pid': active_container_for_runtime_map.container.State.Pid,
                  'image_sha': active_container_for_runtime_map.container.Image
                }
              ]
            } | to_nice_json
          }}

    - name: Regenerate runtime map for newly active container
      become: true
      ansible.builtin.command:
        argv:
          - /usr/sbin/runuser
          - --user
          - "{{ observer_user }}"
          - --
          - /usr/local/bin/frontpage-metrics-runtime-map
          - --allowlist
          - "{{ metrics_config_dir }}/runtime-allowlist.json"
          - --facts
          - "{{ observer_run_dir }}/container-facts.json"
          - --output
          - "{{ observer_run_dir }}/runtime-map.json"
          - --generated-at
          - "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
      changed_when: true

    - name: Restore runtime map ownership after active swap
      become: true
      ansible.builtin.file:
        path: "{{ observer_run_dir }}/runtime-map.json"
        owner: "{{ observer_user }}"
        group: "{{ observer_user }}"
        mode: "0640"

    - name: Wait for application to become healthy
      uri:
        url: "http://localhost:3002/api/health"
        return_content: yes
        timeout: 5
      register: health_check
      until:
        - (health_check.status | default(0)) == 200
        - (health_check.json.status | default("")) == "healthy"
      retries: 10
      delay: 5
      failed_when: false

    - name: Fail if application is not healthy
      fail:
        msg: "Frontpage health check failed: {{ health_check }}"
      when:
        - (health_check.status | default(0)) != 200 or (health_check.json.status | default("")) != "healthy"
        - previous_image == "none"

    - name: Rollback to previous image on failure
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ previous_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "127.0.0.1:3002:3000"
        log_driver: "json-file"
        log_options:
          max-size: "10m"
          max-file: "3"
        healthcheck:
          test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
        env:
          NODE_ENV: production
          PORT: "3000"
          HOSTNAME: "0.0.0.0"
          VERSION: "{{ previous_version }}"
          DATA_DIR: "/data"
          AUTH_URL: "https://reidar.tech"
          AUTH_SECRET: "{{ vault_auth_secret }}"
          AUTH_GITHUB_ID: "{{ vault_auth_github_id }}"
          AUTH_GITHUB_SECRET: "{{ vault_auth_github_secret }}"
          OWNER_GITHUB_ID: "{{ app_owner_github_id }}"
          GITHUB_TOKEN: "{{ vault_github_token }}"
          METRICS_DIR: "/metrics"
        groups:
          - "{{ metrics_group_id }}"
        volumes:
          - "{{ docker_volume_data | default('frontpage_data') }}:/data"
          - "{{ metrics_v1_dir }}:/metrics:ro"
      when:
        - (health_check.status | default(0)) != 200 or (health_check.json.status | default("")) != "healthy"
        - previous_image != "none"
      register: rollback

    - name: Rebind shadow collector to rollback container
      when:
        - rollback is defined
        - rollback.changed | default(false)
      block:
        - name: Stop promoted collector before v1 rollback
          become: true
          ansible.builtin.systemd:
            name: frontpage-metrics-collector-v2.service
            enabled: false
            state: stopped
          when: observability_v2_enabled

        - name: Inspect rollback container for runtime binding
          community.docker.docker_container_info:
            name: "{{ container_name }}"
          register: rollback_container_for_runtime_map

        - name: Write rollback allowlisted container facts
          become: true
          ansible.builtin.copy:
            dest: "{{ observer_run_dir }}/container-facts.json"
            owner: root
            group: "{{ observer_user }}"
            mode: "0640"
            content: >-
              {{
                {
                  'containers': [
                    {
                      'name': container_name,
                      'pid': rollback_container_for_runtime_map.container.State.Pid,
                      'image_sha': rollback_container_for_runtime_map.container.Image
                    }
                  ]
                } | to_nice_json
              }}

        - name: Regenerate runtime map for rollback container
          become: true
          ansible.builtin.command:
            argv:
              - /usr/sbin/runuser
              - --user
              - "{{ observer_user }}"
              - --
              - /usr/local/bin/frontpage-metrics-runtime-map
              - --allowlist
              - "{{ metrics_config_dir }}/runtime-allowlist.json"
              - --facts
              - "{{ observer_run_dir }}/container-facts.json"
              - --output
              - "{{ observer_run_dir }}/runtime-map.json"
              - --generated-at
              - "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
          changed_when: true

        - name: Restore rollback runtime map ownership
          become: true
          ansible.builtin.file:
            path: "{{ observer_run_dir }}/runtime-map.json"
            owner: "{{ observer_user }}"
            group: "{{ observer_user }}"
            mode: "0640"

        - name: Ensure shadow collector is active after rollback binding
          become: true
          ansible.builtin.systemd:
            name: frontpage-metrics-collector-v2-shadow.service
            state: started

    - name: Wait for rollback application to become healthy
      ansible.builtin.uri:
        url: "http://localhost:3002/api/health"
        return_content: yes
        timeout: 5
      register: rollback_health_check
      until:
        - (rollback_health_check.status | default(0)) == 200
        - (rollback_health_check.json.status | default("")) == "healthy"
      retries: 10
      delay: 5
      failed_when: false
      when:
        - rollback is defined
        - rollback.changed | default(false)

    - name: Fail if rollback did not restore a healthy application
      ansible.builtin.fail:
        msg: "Deployment and rollback failed: {{ rollback_health_check }}"
      when:
        - rollback is defined
        - rollback.changed | default(false)
        - (rollback_health_check.status | default(0)) != 200 or (rollback_health_check.json.status | default("")) != "healthy"

    - name: Fail with rollback message
      fail:
        msg: "Deployment failed, rolled back to {{ previous_image }}"
      when: rollback is defined and rollback.changed | default(false)

    - name: Verify container is running
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: container_info

    - name: Fail if deployed container is missing
      ansible.builtin.assert:
        that:
          - container_info.exists | default(false)
        fail_msg: "Frontpage container is missing after deployment."

    - name: Verify deployed container identity
      ansible.builtin.assert:
        that:
          - container_info.container.State.Status == "running"
          - container_info.container.Config.Image == docker_image
          - ("VERSION=" ~ deploy_commit_sha) in container_info.container.Config.Env
          - (not observability_v2_enabled) or ('FRONTPAGE_OBSERVABILITY_V2=1' in container_info.container.Config.Env)
          - observability_v2_enabled or ('FRONTPAGE_OBSERVABILITY_V2=1' not in container_info.container.Config.Env)
        fail_msg: "Running container does not match the requested image or VERSION."

    - name: Read both observability collector service states
      become: true
      ansible.builtin.command:
        argv: ["systemctl", "is-active", "{{ item }}"]
      loop:
        - frontpage-metrics-collector-v2-shadow.service
        - frontpage-metrics-collector-v2.service
      register: observer_service_states
      changed_when: false
      failed_when: false
      when: rollback is not defined or not (rollback.changed | default(false))

    - name: Assert exactly one observability collector is active
      ansible.builtin.assert:
        that:
          - observer_service_states.results | map(attribute='stdout') | select('equalto', 'active') | list | length == 1
          - observer_service_states.results[0].stdout == ('inactive' if observability_v2_enabled else 'active')
          - observer_service_states.results[1].stdout == ('active' if observability_v2_enabled else 'inactive')
        fail_msg: "The selected observability collector must be active and its opposite inactive."
      when: rollback is not defined or not (rollback.changed | default(false))

    - name: Verify shadow app container can read v1 metrics read-only
      community.docker.docker_container_exec:
        container: "{{ container_name }}"
        command: "node -e \"const fs=require('fs'); fs.accessSync('/metrics/latest.json', fs.constants.R_OK); fs.accessSync('/metrics/history.json', fs.constants.R_OK); if (fs.existsSync('/metrics/private') || fs.existsSync('/metrics/v2-shadow')) process.exit(3); try { fs.writeFileSync('/metrics/latest.json', 'x'); process.exit(2); } catch { process.exit(0); }\""
      register: metrics_mount_check
      changed_when: false
      when: not observability_v2_enabled

    - name: Verify promoted app container projection isolation
      community.docker.docker_container_exec:
        container: "{{ container_name }}"
        command: "node -e \"const fs=require('fs'); for(const file of ['/metrics/latest.json','/metrics-public/latest.v2.json','/metrics-owner/latest.v2.json'])fs.accessSync(file,fs.constants.R_OK); if(fs.existsSync('/metrics-private')||fs.existsSync('/metrics-owner/metrics-v2.sqlite3')||fs.existsSync('/metrics-public/metrics-v2.sqlite3'))process.exit(3); for(const dir of ['/metrics','/metrics-public','/metrics-owner']){try{fs.writeFileSync(dir+'/write-test','x');process.exit(2)}catch{}}\""
      register: promoted_metrics_mount_check
      changed_when: false
      when: observability_v2_enabled

    - name: Verify promoted projection and private database permissions
      become: true
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ metrics_dir }}/v2/public/latest.v2.json"
        - "{{ metrics_dir }}/v2/owner/latest.v2.json"
        - "{{ observer_private_dir }}"
      register: promoted_observability_paths
      when: observability_v2_enabled

    - name: Assert promoted collector service and permissions
      ansible.builtin.assert:
        that:
          - promoted_observability_paths.results[0].stat.mode == '0640'
          - promoted_observability_paths.results[1].stat.mode == '0640'
          - promoted_observability_paths.results[2].stat.mode == '0700'
          - promoted_observability_paths.results[0].stat.gr_name == metrics_user
          - promoted_observability_paths.results[1].stat.gr_name == metrics_user
        fail_msg: "Promoted observability projections or private database directory have unsafe permissions."
      when: observability_v2_enabled

    - name: Report deployment status
      debug:
        msg: "✅ Frontpage deployed successfully: {{ container_info.container.State.Status }}"

  handlers:
    - name: Reload systemd
      become: true
      ansible.builtin.systemd:
        daemon_reload: true
