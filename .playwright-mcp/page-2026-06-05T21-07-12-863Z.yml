        - generic [ref=e14]: Active
      - paragraph [ref=e16]: Google OAuth plugin for Hermes Agent — access Claude Opus 4.6, Sonnet 4.6, and Gemini models via Google Antigravity.
      - generic [ref=e17]:
        - generic [ref=e18]:
          - paragraph [ref=e19]: Hermes Antigravity Auth is a Python plugin for Hermes Agent that enables access to Claude and Gemini models through Google's Antigravity OAuth gateway. It handles PKCE OAuth authentication, request transformation (OpenAI → Gemini format), multi-account load balancing with health-score-based rotation, and session recovery from interrupted tool calls.
          - paragraph [ref=e20]: The plugin monkey-patches Hermes' internal HTTP client via httpx event hooks to inject Antigravity-specific headers. It supports dual quota pools (Antigravity headers + Gemini CLI headers), per-account device fingerprints, and proactive token refresh via a background watchdog thread. Claude thinking blocks are stripped from outgoing requests, and tool schemas are sanitized for Antigravity compatibility.
